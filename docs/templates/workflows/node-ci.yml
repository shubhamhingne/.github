# CI starter for Node / TypeScript repos (React, Next.js, Node, React Native JS layer).
# Copy to <repo>/.github/workflows/ci.yml and adjust the package manager / scripts.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present -- --ci

      - name: Build
        run: npm run build --if-present
