name: 🐛 Bug report
description: Report a defect so it can be reproduced and fixed
title: "fix: "
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please search existing issues first to avoid duplicates.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the stack is affected?
      options:
        - Mobile (Android / Kotlin)
        - Mobile (Flutter)
        - Mobile (React Native / iOS)
        - Frontend (React / Next.js)
        - Backend (Python / FastAPI / Flask)
        - Backend (Node.js)
        - AI / LLM
        - Infrastructure / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA where this occurs.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, device, runtime/SDK versions, browser — whatever is relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant logs or screenshots. Redact secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest version.
          required: true
