name: ✨ Feature request
description: Propose a new capability or improvement
title: "feat: "
labels: ["type: feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed solution. Problems age better than solutions.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Mobile (Android / Kotlin)
        - Mobile (Flutter)
        - Mobile (React Native / iOS)
        - Frontend (React / Next.js)
        - Backend (Python / FastAPI / Flask)
        - Backend (Node.js)
        - AI / LLM
        - Infrastructure / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected, and how often?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were not chosen.
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High — blocks important work
        - Medium — meaningful improvement
        - Low — nice to have
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
