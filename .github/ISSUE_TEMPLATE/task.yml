name: 🛠 Task
description: A concrete unit of engineering work (chore, refactor, docs, infra)
title: "chore: "
labels: ["type: task", "status: triage"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Refactor
        - Documentation
        - Tooling / CI
        - Infrastructure
        - Test
        - Chore
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we know this is done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / dependencies
      description: Links, blockers, or related issues.
